name: Build GKI 5.15 Kernel Driver

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y git build-essential bc bison flex libssl-dev clang lld llvm gcc-aarch64-linux-gnu

    - name: Clone GKI 5.15 Source
      run: |
        git clone --depth=1 -b android13-5.15 https://android.googlesource.com/kernel/common.git

    - name: Prepare Kernel
      run: |
        cd common
        make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- O=out gki_defconfig
        make ARCH=arm64 LLVM=1 CROSS_COMPILE=aarch64-linux-gnu- O=out modules_prepare

    - name: Build Driver
      run: |
        make KDIR=$(pwd)/common/out

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: rwMem-Driver
        path: "*.ko"
